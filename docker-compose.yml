services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: comicseller
      POSTGRES_PASSWORD: comicseller
      POSTGRES_DB: comicseller
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comicseller"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://comicseller:comicseller@db:5432/comicseller?schema=public
      PORT: "4000"
      NODE_ENV: production
    ports:
      - "4000:4000"
    volumes:
      # Drop your GCD file (gcd.db or gcd_barcodes.csv) into this host folder,
      # then use the path /data/<file> in Admin -> UPC data -> Import from path.
      # On a NAS, change the left side to your share, e.g.
      #   - /volume1/comics/gcd:/data
      - ./gcd-data:/data

volumes:
  db_data:

# Comicseller — Portainer stack (Docker Compose v3).
#
# In Portainer: Stacks -> Add stack -> paste this -> set the values below in the
# "Environment variables" section (or a .env file). See docs/deployment-portainer.md.
#
# Image is set to your repo: ghcr.io/maxxer79/comicseller (lowercase).
#
# ===========================================================================
#  ENVIRONMENT VARIABLES — set these in Portainer (do NOT hardcode secrets here;
#  this file is committed to GitHub). Copy deploy/.env.example to fill values.
# ---------------------------------------------------------------------------
#  REQUIRED
#    JWT_SECRET       Long random string. Generate: openssl rand -base64 48
#    ADMIN_EMAIL      Your login email (first admin, created on first boot)
#    ADMIN_PASSWORD   Strong password, min 8 chars
#
#  RECOMMENDED
#    DB_PASSWORD      Postgres password            (default: comicseller)
#
#  OPTIONAL
#    ANTHROPIC_API_KEY  Enables AI identification  (default: empty/off)
#    APP_PORT           Host port                  (default: 4000)
#    ADMIN_NAME         Admin display name         (default: Admin)
#    VISION_MOCK        "1" to test AI without a key (default: 0)
#    DATA_DIR           NAS data base folder       (default: /volume1/docker/comicseller)
# ===========================================================================

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: comicseller
      POSTGRES_PASSWORD: ${DB_PASSWORD:-comicseller}
      POSTGRES_DB: comicseller
    volumes:
      # Bind-mount to the NAS folder so data lives on /volume1 (backup-friendly).
      - ${DATA_DIR:-/volume1/docker/comicseller}/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comicseller"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/maxxer79/comicseller:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://comicseller:${DB_PASSWORD:-comicseller}@db:5432/comicseller?schema=public
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VISION_MOCK: ${VISION_MOCK:-0}
    ports:
      - "${APP_PORT:-4000}:4000"
    volumes:
      # Uploaded comic photos live on the NAS folder too.
      - ${DATA_DIR:-/volume1/docker/comicseller}/storage:/app/backend/storage
